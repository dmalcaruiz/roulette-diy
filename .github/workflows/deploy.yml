name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # SPA history fallback. GitHub Pages is a static host with no
      # history-API rewrite, so every client-side route (/block/:id,
      # /e/:id/play, /u/:handle, /wheel/:id) returns a hard 404 on direct
      # load / reload / shared link. GitHub Pages serves /404.html for any
      # unmatched path — making it a copy of index.html boots the SPA there,
      # and React Router renders the correct route from window.location.
      - run: cp dist/index.html dist/404.html

      - run: touch dist/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
